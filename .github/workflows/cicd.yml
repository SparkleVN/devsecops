name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '18'

jobs:
  # ========================
  # CI PHASE - Security & Quality Checks
  # ========================
  security-scan:
    name: Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          gitleaks detect \
            --source . \
            --no-git \
            --report-format json \
            --report-path reports/gitleaks-report.json \
            --exit-code 2

      - name: Debug - Show Gitleaks Results
        if: always()
        run: |
          echo "=== GITLEAKS SCAN RESULTS ==="
          if [ -f reports/gitleaks-report.json ]; then
            echo "Report file exists, showing findings:"
            cat reports/gitleaks-report.json | jq '.'
            echo ""
            echo "=== SUMMARY ==="
            echo "Total findings:" $(cat reports/gitleaks-report.json | jq '. | length')
            echo ""
            echo "=== DETAILS ==="
            cat reports/gitleaks-report.json | jq -r '.[] | "File: \(.File)\nLine: \(.StartLine)\nRule: \(.RuleID)\nSecret: \(.Secret)\n---"'
          else
            echo "No gitleaks report found"
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.json
          retention-days: 30

      - name: Check Gitleaks Status
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks found secrets! Check debug output above."
          exit 1

      - name: Notify Telegram on Security Failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            SECURITY ALERT
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            Gitleaks found potential secrets in your code!
            Please review your commit and remove any hardcoded secrets.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # CI PHASE - Dependency Scan
  # ========================
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Dependency Scan (via Docker)
        continue-on-error: true
        run: |
          mkdir -p reports
          
          # Run Trivy via Docker container - no installation needed
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            aquasec/trivy:latest fs \
            --format json --output /workspace/reports/trivy-deps.json \
            /workspace
          
          # Check for CRITICAL/HIGH and fail if found
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            aquasec/trivy:latest fs \
            --severity CRITICAL,HIGH --exit-code 1 \
            /workspace

      - name: Upload Dependency Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-dependency-report
          path: reports/trivy-deps.json
          retention-days: 30

      - name: Notify Telegram on Dependency Issues
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            DEPENDENCY VULNERABILITIES FOUND
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            Trivy found CRITICAL or HIGH vulnerabilities in dependencies!
            Please review and update affected packages.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # CI PHASE - Build & Test
  # ========================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application (if needed)
        run: echo "Build completed successfully"

      - name: Notify Telegram on Build Failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            BUILD FAILED
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            Build or tests failed during CI phase.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # CD PHASE - Docker Build & Push
  # ========================
  docker-build:
    name: Docker Build & Push
    runs-on: self-hosted
    needs: [security-scan, dependency-scan, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.build.outputs.image-url }}
      lowercase-repo: ${{ steps.repo.outputs.lowercase }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # Alternative: Use Personal Access Token if GITHUB_TOKEN fails
          # username: ${{ secrets.CR_USER }}
          # password: ${{ secrets.CR_PAT }}

      - name: Set lowercase repository name
        id: repo
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase=$LOWERCASE_REPO" >> $GITHUB_OUTPUT
          echo "Repository: ${{ github.repository }}"
          echo "Lowercase: $LOWERCASE_REPO"

      - name: Debug Registry Info
        run: |
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Image Name: ${{ env.IMAGE_NAME }}"
          echo "Lowercase Repo: ${{ steps.repo.outputs.lowercase }}"
          echo "Actor: ${{ github.actor }}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Notify Telegram on Docker Build Failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            DOCKER BUILD FAILED
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            Docker image build/push failed during CD phase.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # CD PHASE - Container Image Scan
  # ========================
  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: self-hosted
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          docker pull ${IMAGE_URL}

      - name: Run Trivy Image Scan (via Docker)
        continue-on-error: true
        run: |
          mkdir -p reports
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          
          # Run Trivy via Docker container - no installation needed
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd)/reports:/reports \
            aquasec/trivy:latest image \
            --format json --output /reports/trivy-image.json \
            ${IMAGE_URL}
          
          # Check for CRITICAL/HIGH and fail if found
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH --exit-code 1 \
            ${IMAGE_URL}

      - name: Upload Image Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: reports/trivy-image.json
          retention-days: 30

      - name: Notify Telegram on Image Vulnerabilities
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            CONTAINER IMAGE VULNERABILITIES FOUND
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Image:* `${{ needs.docker-build.outputs.lowercase-repo }}:latest`
            *Author:* ${{ github.actor }}
            Trivy found CRITICAL or HIGH vulnerabilities in Docker image!
            Please review base image and dependencies.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # CD PHASE - Deploy 
  # ========================
  deploy:
    name: Deploy Application
    runs-on: self-hosted
    needs: [docker-build, image-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Local Docker
        run: |
          echo "Deploying application locally..."
          echo "Image: ${{ needs.docker-build.outputs.image-url }}"
          echo "Digest: ${{ needs.docker-build.outputs.image-digest }}"

          # Use lowercase repository name from docker-build job
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          echo "Docker Image URL: ${IMAGE_URL}"

          # Try to pull the image from registry, fallback to local build if fails
          if ! docker pull ${IMAGE_URL}; then
            echo "Failed to pull from registry, building locally..."
            docker build -t ${IMAGE_URL} .
          fi

          # Stop existing container if running
          docker stop cicd-app 2>/dev/null || true
          docker rm cicd-app 2>/dev/null || true

          # Run the new container
          docker run -d \
            --name cicd-app \
            -p 3000:3000 \
            ${IMAGE_URL}

          echo "Deployment completed successfully!"
          echo "Application is now running at: http://localhost:3000"

      - name: Notify Telegram on Deployment Failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            DEPLOYMENT FAILED
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            Application deployment failed.
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})


  # ========================
  # NOTIFICATION - Success
  # ========================
  notify-success:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-scan, build-and-test, image-scan, docker-build, deploy]
    if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Notify Telegram on Success
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            PIPELINE SUCCESS

            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}

            *Security Checks:*
            - Secrets Scan: Passed (Gitleaks)
            - Dependency Scan: Passed (Trivy)
            - Container Scan: Passed (Trivy)
            
            *Build & Deploy:*
            - Build & Test: Passed
            - Docker Build: Completed
            - Deployment: Successful

            Application URL: http://localhost:3000
            [View Action Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Your application is now live!