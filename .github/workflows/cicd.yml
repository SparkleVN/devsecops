name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '18'

jobs:
  # ========================
  # CI PHASE - Security & Quality Checks
  # ========================
  security-scan:
    name: Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          gitleaks detect \
            --source . \
            --no-git \
            --report-format json \
            --report-path reports/gitleaks-report.json \
            --exit-code 2

      - name: Debug - Show Gitleaks Results
        if: always()
        run: |
          echo "=== GITLEAKS SCAN RESULTS ==="
          if [ -f reports/gitleaks-report.json ]; then
            echo "Report file exists, showing findings:"
            cat reports/gitleaks-report.json | jq '.'
            echo ""
            echo "=== SUMMARY ==="
            echo "Total findings:" $(cat reports/gitleaks-report.json | jq '. | length')
            echo ""
            echo "=== DETAILS ==="
            cat reports/gitleaks-report.json | jq -r '.[] | "File: \(.File)\nLine: \(.StartLine)\nRule: \(.RuleID)\nSecret: \(.Secret)\n---"'
          else
            echo "No gitleaks report found"
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.json
          retention-days: 30

      - name: Check Gitleaks Status
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks found secrets! Check debug output above."
          exit 1

      - name: Notify Telegram on Security Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>SECURITY ALERT</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0AGitleaks found potential secrets in your code!%0APlease review your commit and remove any hardcoded secrets.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # CI PHASE - Dependency Scan
  # ========================
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Dependency Scan (via Docker)
        continue-on-error: true
        run: |
          mkdir -p reports
          
          # Run Trivy via Docker container - no installation needed
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            aquasec/trivy:latest fs \
            --format json --output /workspace/reports/trivy-deps.json \
            /workspace
          
          # Check for CRITICAL/HIGH and fail if found
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            aquasec/trivy:latest fs \
            --severity CRITICAL,HIGH --exit-code 1 \
            /workspace

      - name: Upload Dependency Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-dependency-report
          path: reports/trivy-deps.json
          retention-days: 30

      - name: Notify Telegram on Dependency Issues
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>DEPENDENCY VULNERABILITIES FOUND</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0ATrivy found CRITICAL or HIGH vulnerabilities in dependencies!%0APlease review and update affected packages.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # CI PHASE - Build & Test
  # ========================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application (if needed)
        run: echo "Build completed successfully"

      - name: Notify Telegram on Build Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>BUILD FAILED</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0ABuild or tests failed during CI phase.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # CD PHASE - Docker Build & Push
  # ========================
  docker-build:
    name: Docker Build & Push
    runs-on: self-hosted
    needs: [security-scan, dependency-scan, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.build.outputs.image-url }}
      lowercase-repo: ${{ steps.repo.outputs.lowercase }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Set lowercase repository name
        id: repo
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase=$LOWERCASE_REPO" >> $GITHUB_OUTPUT
          echo "Repository: ${{ github.repository }}"
          echo "Lowercase: $LOWERCASE_REPO"

      - name: Build Docker image
        id: build
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}:latest"
          IMAGE_SHA="${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}:${{ github.sha }}"
          
          echo "Building Docker image..."
          docker build -t ${IMAGE_URL} -t ${IMAGE_SHA} .
          
          echo "Pushing to registry..."
          docker push ${IMAGE_URL}
          docker push ${IMAGE_SHA}
          
          echo "Build completed successfully!"
          echo "image-url=${IMAGE_URL}" >> $GITHUB_OUTPUT
          echo "image-sha=${IMAGE_SHA}" >> $GITHUB_OUTPUT

      - name: Notify Telegram on Docker Build Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>DOCKER BUILD FAILED</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0ADocker image build/push failed during CD phase.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # CD PHASE - Container Image Scan
  # ========================
  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: self-hosted
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull Docker Image
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          docker pull ${IMAGE_URL}

      - name: Run Trivy Image Scan (via Docker)
        continue-on-error: true
        run: |
          mkdir -p reports
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          
          # Run Trivy via Docker container - no installation needed
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd)/reports:/reports \
            aquasec/trivy:latest image \
            --format json --output /reports/trivy-image.json \
            ${IMAGE_URL}
          
          # Check for CRITICAL/HIGH and fail if found
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH --exit-code 1 \
            ${IMAGE_URL}

      - name: Upload Image Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: reports/trivy-image.json
          retention-days: 30

      - name: Notify Telegram on Image Vulnerabilities
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>CONTAINER IMAGE VULNERABILITIES FOUND</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Image:</b> <code>${{ needs.docker-build.outputs.lowercase-repo }}:latest</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0ATrivy found CRITICAL or HIGH vulnerabilities in Docker image!%0APlease review base image and dependencies.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # CD PHASE - Deploy 
  # ========================
  deploy:
    name: Deploy Application
    runs-on: self-hosted
    needs: [docker-build, image-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Local Docker
        run: |
          echo "Deploying application locally..."
          echo "Image: ${{ needs.docker-build.outputs.image-url }}"
          echo "Digest: ${{ needs.docker-build.outputs.image-digest }}"

          # Use lowercase repository name from docker-build job
          IMAGE_URL="${{ env.REGISTRY }}/${{ needs.docker-build.outputs.lowercase-repo }}:latest"
          echo "Docker Image URL: ${IMAGE_URL}"

          # Try to pull the image from registry, fallback to local build if fails
          if ! docker pull ${IMAGE_URL}; then
            echo "Failed to pull from registry, building locally..."
            docker build -t ${IMAGE_URL} .
          fi

          # Stop existing container if running
          docker stop cicd-app 2>/dev/null || true
          docker rm cicd-app 2>/dev/null || true

          # Run the new container
          docker run -d \
            --name cicd-app \
            -p 3000:3000 \
            ${IMAGE_URL}

          echo "Deployment completed successfully!"
          echo "Application is now running at: http://localhost:3000"

      - name: Notify Telegram on Deployment Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>DEPLOYMENT FAILED</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0AApplication deployment failed.%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>"


  # ========================
  # NOTIFICATION - Success
  # ========================
  notify-success:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-scan, build-and-test, image-scan, docker-build, deploy]
    if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Notify Telegram on Success
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>PIPELINE SUCCESS</b>%0A%0A<b>Repository:</b> <code>${{ github.repository }}</code>%0A<b>Branch:</b> <code>${{ github.ref_name }}</code>%0A<b>Commit:</b> <code>${{ github.sha }}</code>%0A<b>Author:</b> ${{ github.actor }}%0A%0A<b>Security Checks:</b>%0A- Secrets Scan: Passed (Gitleaks)%0A- Dependency Scan: Passed (Trivy)%0A- Container Scan: Passed (Trivy)%0A%0A<b>Build &amp; Deploy:</b>%0A- Build &amp; Test: Passed%0A- Docker Build: Completed%0A- Deployment: Successful%0A%0AApplication URL: http://localhost:3000%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Details</a>%0A%0AYour application is now live!"