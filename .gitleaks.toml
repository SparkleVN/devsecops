[[rules]]
id = "hardcoded-credentials"
description = "Hardcoded credentials in config (catches fallback values in process.env patterns)"
regex = '''(?i)(apiKey|api_key|password|pwd|secret|token|jwt|sessionSecret|databasePassword)\s*[:=]\s*.*?['"]([a-zA-Z0-9_@!#$%^&*()+=\-]{8,})['"]'''
tags = ["secret", "credentials", "sast"]
